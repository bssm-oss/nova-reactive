# SPDX-License-Identifier: Apache-2.0
#
# Keeps a draft GitHub Release up to date with the next version's changelog.
# Each merged PR refreshes the draft; the tag-push workflow (release.yml) then
# publishes that draft as the version's GitHub Release once Maven Central succeeds.
#
# Runs only on push to main. release-drafter requires its config to live on
# the default branch, so a pull_request trigger would fail on the very PR
# that introduces the config. Labels are handled separately by boring-cyborg,
# so we do not need release-drafter's autolabeler on pull_request events.

name: Release drafter

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
