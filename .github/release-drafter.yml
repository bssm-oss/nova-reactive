# SPDX-License-Identifier: Apache-2.0
#
# Config for release-drafter — drafts the next GitHub Release by grouping
# merged PRs into categories. Triggered by .github/workflows/release-drafter.yml.

name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

# semver bump derived from PR labels — major beats minor beats patch.
version-resolver:
  major:
    labels:
      - breaking-change
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - chore
      - refactor
      - test
      - build
      - ci
      - dependencies
      - documentation
      - performance
  default: patch

categories:
  - title: ":warning: Breaking changes"
    labels:
      - breaking-change
  - title: ":rocket: Features"
    labels:
      - enhancement
  - title: ":bug: Bug fixes"
    labels:
      - bug
  - title: ":zap: Performance"
    labels:
      - performance
  - title: ":books: Documentation"
    labels:
      - documentation
  - title: ":wrench: Maintenance"
    labels:
      - chore
      - refactor
      - test
      - build
      - ci
  - title: ":package: Dependencies"
    labels:
      - dependencies
  - title: ":sparkles: Module changes"
    labels:
      - core
      - r2dbc
      - schema
      - spring-boot
      - spring-data
      - metrics
      - dialect-postgresql
      - dialect-mysql
      - dialect-mariadb
      - dialect-h2
      - dialect-oracle
  # Catch-all for PRs that escape every named category. Without this, an
  # unlabeled merged PR is still rendered (under no heading) but is easy to
  # miss in the draft. The "*" wildcard matches "no labels at all".
  - title: ":sparkles: Other changes"
    labels:
      - "*"

# Exclude internal noise from the changelog.
exclude-labels:
  - duplicate
  - invalid
  - wontfix
  - question

change-template: "- $TITLE (#$NUMBER) — @$AUTHOR"
# '@' 는 필수다. PR 제목에는 JPA 애노테이션이 그대로 들어가는데(`@OneToMany`, `@Id`, `@Entity` …),
# escape하지 않으면 GitHub이 이를 실존 계정으로 멘션 링크한다 — @Id/@Entity는 실제 개인,
# @OneToMany/@ManyToOne/@Convert/@Embeddable는 실제 조직이라 무관한 사람에게 알림이 나간다.
# $AUTHOR는 change-template에서 별도로 붙으므로 저자 크레딧은 영향받지 않는다.
change-title-escapes: '\<*_&@'

template: |
  ## What's changed in $RESOLVED_VERSION

  $CHANGES

  **Full changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
